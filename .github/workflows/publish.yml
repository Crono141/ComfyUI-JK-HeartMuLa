name: Publish to Comfy registry

# Publishes this pack to the ComfyUI Registry (registry.comfy.org), which
# ComfyUI-Manager ingests. Runs on a pyproject.toml change (e.g. a version bump)
# or manually from the Actions tab. Requires a repo secret REGISTRY_ACCESS_TOKEN
# (a publisher API key from registry.comfy.org for PublisherId "crono141").
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
